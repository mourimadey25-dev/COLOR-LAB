<!DOCTYPE html>
<html lang="en">
<head>
<title>Colour Mix Lab</title>
<link rel="stylesheet" href="style.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Segoe UI', Arial, sans-serif;
background: #f0f4ff;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
}
.card {
background: white;
border-radius: 20px;
box-shadow: 0 6px 32px rgba(0,0,0,0.10);
padding: 32px 28px 28px;
max-width: 480px;
width: 100%;
}
h1 {
text-align: center;
font-size: 1.8rem;
color: #222;
margin-bottom: 6px;
}
.subtitle {
text-align: center;
font-size: 0.95rem;
color: #777;
margin-bottom: 24px;
}
#colorBox {
width: 100%;
height: 130px;
border-radius: 14px;
border: 2px solid #e0e0e0;
margin-bottom: 24px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
font-size: 1rem;
font-weight: 600;
transition: background 0.2s;
letter-spacing: 1px;
line-height: 1.6;
}
.slider-row {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 14px;
}
.dot {
width: 18px;
height: 18px;
border-radius: 50%;
flex-shrink: 0;
}
.slider-row label {
font-size: 0.9rem;
color: #555;
width: 46px;
}
input[type="range"] {
flex: 1;
height: 6px;
border-radius: 4px;
outline: none;
cursor: pointer;
appearance: none;
-webkit-appearance: none;
background: #e0e0e0;
}
input[type="range"]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 20px;
height: 20px;
border-radius: 50%;
background: #444;
cursor: pointer;
border: 3px solid white;
box-shadow: 0 1px 4px rgba(0,0,0,0.25);
}
#r { accent-color: #e24b4a; }
#g { accent-color: #4caf50; }
#b { accent-color: #378add; }
.val {
font-size: 0.9rem;
font-weight: 600;
min-width: 30px;
text-align: right;
color: #333;
}
</style>
</head>
<body>
<div class="card">
<h1>🎨 Colour Mix Lab</h1>
<p class="subtitle">Drag the sliders to mix colours like a scientist!</p>
<div id="colorBox"></div>
<div class="slider-row">
<span class="dot" style="background:#e24b4a;"></span>
<label for="r">Red</label>
<input type="range" id="r" min="0" max="255" value="200" step="1" oninput="update()">
<span class="val" id="rv">200</span>
</div>
<div class="slider-row">
<span class="dot" style="background:#4caf50;"></span>
<label for="g">Green</label>
<input type="range" id="g" min="0" max="255" value="80" step="1" oninput="update()">
<span class="val" id="gv">80</span>
</div>
<div class="slider-row">
<span class="dot" style="background:#378add;"></span>
<label for="b">Blue</label>
<input type="range" id="b" min="0" max="255" value="50" step="1" oninput="update()">
<span class="val" id="bv">50</span>
</div>
</div>
<script>
function update() {
const r = +document.getElementById('r').value;
const g = +document.getElementById('g').value;
const b = +document.getElementById('b').value;

document.getElementById('rv').textContent = r;
document.getElementById('gv').textContent = g;
document.getElementById('bv').textContent = b;

const box = document.getElementById('colorBox');
box.style.background = `rgb(${r}, ${g}, ${b})`;

const brightness = (r * 299 + g * 587 + b * 114) / 1000;
box.style.color = brightness > 128 ? 'rgba(0,0,0,0.65)' : 'rgba(255,255,255,0.9)';

// Convert RGB to HEX format
const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();

box.innerHTML = `
<div>RGB Code = rgb(${r}, ${g}, ${b})</div>
<div>HEX Code = ${hex}</div>
`;
}
update();
</script>
</body>
</html>
